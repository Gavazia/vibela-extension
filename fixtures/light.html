<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vibela Light Fixture</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: rgb(248, 250, 252); color: rgb(15, 23, 42); }
      main { max-width: 760px; margin: 48px auto; padding: 24px; }
      .card { padding: 24px; border-radius: 16px; background: rgb(255, 255, 255); color: rgb(15, 23, 42); }
      .title { margin: 0 0 12px; font-size: 30px; font-weight: 700; }
      .cta { display: inline-block; margin-top: 16px; padding: 12px 24px; border-radius: 9999px; background: rgb(79, 70, 229); color: rgb(255, 255, 255); font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <section class="card fixture-card max-w-panel" aria-label="Light fixture card" title="Light card title">
        <h1 class="title hero-heading">Light theme fixture</h1>
        <p>Bright fixture for annotation and Tailwind style mapping checks.</p>
        <button class="cta primary-action" type="button">Start review</button>
      </section>
    </main>
  </body>
</html>
