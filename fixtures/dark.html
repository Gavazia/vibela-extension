<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vibela Dark Fixture</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: rgb(15, 23, 42); color: rgb(226, 232, 240); }
      main { max-width: 780px; margin: 48px auto; padding: 24px; }
      .panel { padding: 32px; border-radius: 24px; background: rgb(30, 41, 59); color: rgb(226, 232, 240); }
      .danger { padding: 10px 20px; border: 0; border-radius: 12px; background: rgb(220, 38, 38); color: rgb(255, 255, 255); font-size: 16px; font-weight: 700; }
      .muted { color: rgb(148, 163, 184); font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel night-card" aria-label="Dark fixture panel">
        <h1>Dark theme fixture</h1>
        <p class="muted">Dark fixture for raw CSS extraction and transform prompt checks.</p>
        <button class="danger destructive-action" type="button" title="Delete draft">Delete draft</button>
      </section>
    </main>
  </body>
</html>
